<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="/order/my-orders">Đơn hàng</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">📦 Chi tiết đơn hàng</div>
        <h1 class="cs-page-title mb-0">Đơn hàng #<span th:text="${order.id}"></span></h1>
        <div class="cs-muted">Ngày đặt: <span th:text="${#dates.format(order.create_date, 'dd/MM/yyyy HH:mm')}"></span></div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-8">
            <div class="cs-card p-4">
                <h3 class="h5 mb-3">Sản phẩm đã đặt</h3>
                <div class="table-responsive">
                    <table class="table cs-table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Tên xe</th>
                            <th class="text-end">Giá</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-end">Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="detail : ${details}">
                            <td>
                                <span th:text="${detail.car_id}">Car ID</span>
                                <!-- Note: In a real app, you'd join with Car table to get name -->
                            </td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'VNĐ')}"></td>
                            <td class="text-center" th:text="${detail.quantity}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'VNĐ')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="cs-card p-4">
                <h3 class="h5 mb-3">Thông tin đơn hàng</h3>
                <div class="mb-3">
                    <span class="cs-muted">Trạng thái:</span>
                    <span class="badge bg-primary" th:text="${order.status}"></span>
                </div>
                <div class="mb-3">
                    <span class="cs-muted">Địa chỉ giao hàng:</span>
                    <p th:text="${order.address}"></p>
                </div>
                <div class="mb-3">
                    <span class="cs-muted">Tổng tiền:</span>
                    <div class="h5 fw-bold text-primary">
                        <span th:text="${#numbers.formatDecimal(details.stream().map(d -> d.price * d.quantity).sum(), 0, 'COMMA', 0, 'VNĐ')}"></span>
                    </div>
                </div>
                <a href="/order/my-orders" class="btn cs-btn cs-btn-ghost w-100">Quay lại danh sách</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
