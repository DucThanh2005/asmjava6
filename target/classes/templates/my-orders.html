<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body>

    <header class="ford-header">
        <div class="ford-header-inner">
            <nav class="ford-nav-left">
                <a href="/car/list">Sản phẩm</a>
                <a href="/cart/view">Mua xe</a>
                <a href="/service">Dịch vụ</a>
                <a href="/support">Hỗ trợ</a>
            </nav>
            <a class="ford-logo" href="/">CarStore</a>
            <div class="ford-nav-right">
                <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <div class="container cs-container py-4">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">📦 Đơn hàng của tôi</div>
            <h1 class="cs-page-title mb-0">Đơn hàng cá nhân</h1>
        </div>

        <div class="cs-card p-3 p-md-4">
            <div class="table-responsive">
                <table class="table cs-table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ngày đặt</th>
                            <th>Địa chỉ</th>
                            <th>Trạng thái</th>
                            <th>Chi tiết</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}"></td>
                            <td th:text="${#dates.format(order.create_date, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${order.address}"></td>
                            <td th:text="${order.status}"></td>
                            <td>
                                <a th:href="@{'/order/detail/' + ${order.id}}"
                                    class="btn cs-btn cs-btn-primary btn-sm">Chi tiết</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(orders)}" class="text-center mt-3">Bạn chưa có đơn hàng nào.</p>
        </div>
    </div>

</body>

</html>
