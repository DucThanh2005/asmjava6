<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </a>
            <a sec:authorize="isAuthenticated()" href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">📊 Admin</div>
        <h1 class="cs-page-title mb-1">Dashboard</h1>
        <div class="cs-muted">Tổng quan nhanh về hệ thống.</div>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-4">
            <div class="cs-card p-4">
                <div class="cs-muted mb-2">Total cars</div>
                <div class="display-6 fw-bold" th:text="${totalCars}">0</div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="cs-card p-4">
                <div class="cs-muted mb-2">Total users</div>
                <div class="display-6 fw-bold" th:text="${totalUsers}">0</div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="cs-card p-4">
                <div class="cs-muted mb-2">Total orders</div>
                <div class="display-6 fw-bold" th:text="${totalOrders}">0</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mt-3">
        <div class="col-12">
            <div class="cs-card p-4">
                <div class="cs-muted mb-2">Quick links</div>
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn cs-btn cs-btn-ghost" href="/">Home</a>
                    <a class="btn cs-btn cs-btn-ghost" href="/car/list">Car list</a>
                    <a class="btn cs-btn cs-btn-primary" href="/car/create">Create car</a>
                    <a class="btn cs-btn cs-btn-outline" href="/admin/users">Manage users</a>
                    <a class="btn cs-btn cs-btn-outline" href="/admin/orders">Manage orders</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
