<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${car.name}">Car Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </a>
            <a sec:authorize="isAnonymous()" href="/login" class="ford-icon-btn" title="Tài khoản" aria-label="Đăng nhập">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
            <a sec:authorize="isAuthenticated()" href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">🚗 Chi tiết xe</div>
        <h1 class="cs-page-title mb-0" th:text="${car.name}">Car Name</h1>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6">
            <div class="cs-card p-3">
                <img th:src="@{'/images/' + ${car.image}}" class="img-fluid rounded-3" alt="Car Image">
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="cs-card p-4">
                <h3 class="h4 mb-3" th:text="${car.name}">Car Name</h3>
                <div class="mb-3">
                    <span class="cs-muted">Giá:</span>
                    <span class="h5 fw-bold text-primary" th:text="${car.price} + ' VND'">Price</span>
                </div>
                <div class="mb-3">
                    <span class="cs-muted">Mô tả:</span>
                    <p th:text="${car.description}">Description</p>
                </div>
                <div class="mb-3">
                    <span class="cs-muted">Năm sản xuất:</span>
                    <span th:text="${car.year}">Year</span>
                </div>
                <div class="mb-3">
                    <span class="cs-muted">Màu sắc:</span>
                    <span th:text="${car.color}">Color</span>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn cs-btn cs-btn-primary" th:href="@{'/cart/add/' + ${car.id}}">Thêm vào giỏ</a>
                    <a class="btn cs-btn cs-btn-outline" href="/car/list">Quay lại danh sách</a>
                    <a class="btn cs-btn cs-btn-warning" th:href="@{'/car/edit/' + ${car.id}}" sec:authorize="hasRole('ADMIN')">Sửa</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
