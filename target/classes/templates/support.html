<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ho tro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body class="bg-light">

    <header class="ford-header">
        <div class="ford-header-inner">
            <nav class="ford-nav-left">
                <a href="/car/list">Sản phẩm</a>
                <a href="/cart/view">Mua xe</a>
                <a href="/service">Dịch vụ</a>
                <a href="/support">Hỗ trợ</a>
            </nav>
            <a class="ford-logo" href="/">CarStore</a>
            <div class="ford-nav-right">
                <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                </a>
                <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">📩 DỊCH VỤ HỖ TRỢ</div>
            <h1 class="cs-page-title mb-0">HỖ TRỢ</h1>
        </div>
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-body">

                <h4 class="mb-3 text-center">📩 Gửi yêu cầu</h4>

                <p class="text-center">Dịch vụ:
                    <span class="badge bg-primary" th:text="${type}"></span>
                </p>

                <form action="/support" method="post">

                    <input type="hidden" name="type" th:value="${type}">

                    <div class="mb-3">
                        <label>Tên</label>
                        <input class="form-control" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label>SĐT</label>
                        <input class="form-control" name="phone" required>
                    </div>

                    <div class="mb-3">
                        <label>Nội dung</label>
                        <textarea class="form-control" name="content" rows="3" required></textarea>
                    </div>

                    <button class="btn btn-success w-100">Gửi yêu cầu</button>
                </form>

                <div class="text-center mt-3">
                    <a href="/history" class="btn btn-outline-primary btn-sm">Xem lịch sử</a>
                </div>

                <p class="text-success text-center mt-2" th:text="${message}"></p>

            </div>
        </div>

    </div>

</body>

</html>
