<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/users">Users</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">🛠️ Admin</div>
        <h1 class="cs-page-title mb-0">Thêm / Sửa user</h1>
    </div>

    <div class="cs-card p-3 p-md-4">
        <form th:action="@{/admin/users/save}" th:object="${account}" method="post" class="row g-3">
            <div class="col-12">
                <label class="form-label cs-muted">Username</label>
                <input class="form-control" type="text" th:field="*{username}" required />
            </div>
            <div class="col-12">
                <label class="form-label cs-muted">Password</label>
                <input class="form-control" type="password" th:field="*{password}" required />
            </div>
            <div class="col-12">
                <label class="form-label cs-muted">Fullname</label>
                <input class="form-control" type="text" th:field="*{fullname}" required />
            </div>
            <div class="col-12">
                <label class="form-label cs-muted">Email</label>
                <input class="form-control" type="email" th:field="*{email}" required />
            </div>
            <div class="col-12">
                <label class="form-label cs-muted">Role</label>
                <select class="form-control" th:field="*{role}" required>
                    <option value="ROLE_USER">User</option>
                    <option value="ROLE_ADMIN">Admin</option>
                </select>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn cs-btn cs-btn-primary" type="submit">Save</button>
                <a class="btn cs-btn cs-btn-ghost" href="/admin/users">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
