<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>
<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </a>
            <a href="/login" class="ford-icon-btn" title="Tài khoản" aria-label="Đăng nhập">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="cs-card">
                <div class="cs-card-header p-4">
                    <div class="cs-badge mb-3">👤 Tạo tài khoản</div>
                    <h2 class="cs-page-title mb-1">Đăng ký khách hàng</h2>
                    <div class="cs-muted">Vui lòng nhập thông tin để tạo tài khoản.</div>
                </div>

                <div class="p-4">
                    <form th:action="@{/signup}" method="post" class="vstack gap-3">
                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <div>
                            <label class="form-label cs-muted">Tên đăng nhập</label>
                            <input class="form-control" type="text" name="username" placeholder="Username" required>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Mật khẩu</label>
                            <input class="form-control" type="password" name="password" placeholder="Password" required>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Họ và tên</label>
                            <input class="form-control" type="text" name="fullname" placeholder="Full name" required>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Email</label>
                            <input class="form-control" type="email" name="email" placeholder="Email" required>
                        </div>

                        <button class="btn cs-btn cs-btn-primary w-100" type="submit">Đăng ký</button>
                        <a class="btn cs-btn cs-btn-ghost w-100" href="/login">Quay lại đăng nhập</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
