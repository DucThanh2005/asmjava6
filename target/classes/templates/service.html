<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dich vu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body class="bg-light">

    <header class="ford-header">
        <div class="ford-header-inner">
            <nav class="ford-nav-left">
                <a href="/car/list">Sản phẩm</a>
                <a href="/cart/view">Mua xe</a>
                <a href="/service">Dịch vụ</a>
                <a href="/support">Hỗ trợ</a>
            </nav>
            <a class="ford-logo" href="/">CarStore</a>
            <div class="ford-nav-right">
                <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                </a>
                <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">🚗 DỊCH VỤ HỖ TRỢ</div>
            <h1 class="cs-page-title mb-0">DỊCH VỤ</h1>
        </div>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow h-100 text-center">
                    <div class="card-body">
                        <h5>📞 Gọi hỗ trợ</h5>
                        <p class="text-muted">Hotline 24/7</p>
                        <h4 class="text-danger">1900-1234</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow h-100 text-center">
                    <div class="card-body">
                        <h5>💬 Chat hỗ trợ</h5>
                        <p>Nhắn tin trực tiếp</p>
                        <a href="/support?type=chat" class="btn btn-primary">Chat ngay</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow h-100 text-center">
                    <div class="card-body">
                        <h5>🛠️ Bảo hành</h5>
                        <p>Đăng ký bảo hành xe</p>
                        <a href="/support?type=baohanh" class="btn btn-success">Đăng ký</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow h-100 text-center">
                    <div class="card-body">
                        <h5>🔄 Đổi / Trả</h5>
                        <p>Yêu cầu đổi xe</p>
                        <a href="/support?type=doitra" class="btn btn-warning">Yêu cầu</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow h-100 text-center">
                    <div class="card-body">
                        <h5>📦 Dịch vụ khác</h5>
                        <p>Bảo dưỡng, sửa chữa...</p>
                        <a href="/support?type=dichvu" class="btn btn-dark">Đăng ký</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
