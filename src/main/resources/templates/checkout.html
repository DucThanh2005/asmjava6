<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">🛒 Checkout</div>
        <h1 class="cs-page-title mb-0">Thanh toán</h1>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-8">
            <div class="cs-card p-4">
                <h3 class="h5 mb-3">Thông tin giao hàng</h3>
                <form th:action="@{/order/place}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Địa chỉ giao hàng</label>
                        <textarea class="form-control" name="address" rows="3" placeholder="Nhập địa chỉ giao hàng" required></textarea>
                    </div>
                    <button type="submit" class="btn cs-btn cs-btn-primary">Đặt hàng</button>
                    <a href="/cart/view" class="btn cs-btn cs-btn-ghost">Quay lại giỏ hàng</a>
                </form>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="cs-card p-4">
                <h3 class="h5 mb-3">Tóm tắt đơn hàng</h3>
                <div class="mb-3">
                    <div th:each="item : ${cart}" class="d-flex justify-content-between mb-2">
                        <span th:text="${item.name} + ' x' + ${item.quantity}"></span>
                        <span th:text="${item.price * item.quantity}"></span>
                    </div>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Tổng cộng</span>
                    <span th:text="${total}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
