<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Car Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </a>
            <a sec:authorize="isAuthenticated()" href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">🛠️ Admin</div>
        <h1 class="cs-page-title mb-0">Thêm / Sửa xe</h1>
    </div>

    <div class="cs-card p-3 p-md-4">
        <form th:action="@{/car/save}"
              th:object="${car}"
              method="post"
              enctype="multipart/form-data"
              class="row g-3">

            <input type="hidden" th:field="*{id}" />

            <div class="col-12">
                <label class="form-label cs-muted">Name</label>
                <input class="form-control" type="text" th:field="*{name}" placeholder="VD: BMW X5" required />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label cs-muted">Price</label>
                <input class="form-control" type="number" th:field="*{price}" placeholder="3500000000" required />
            </div>

            <div class="col-12 col-md-6">
                <label class="form-label cs-muted">Brand ID</label>
                <input class="form-control" type="number" th:field="*{brandId}" placeholder="1..n" required />
            </div>

            <div class="col-12">
                <label class="form-label cs-muted">Image</label>
                <input class="form-control" type="file" name="file" />
                <div class="form-text cs-muted">Ảnh sẽ lưu vào thư mục `static/images` và hiển thị ở trang list/home.</div>
            </div>

            <div class="col-12" th:if="${car.image != null}">
                <div class="cs-muted mb-2">Preview</div>
                <img th:src="@{'/images/' + ${car.image}}" class="img-fluid rounded-3" style="max-height:220px; border:1px solid rgba(255,255,255,.12);" />
            </div>

            <div class="col-12 d-flex gap-2">
                <button class="btn cs-btn cs-btn-primary" type="submit">Save</button>
                <a class="btn cs-btn cs-btn-ghost" href="/car/list">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
