<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="/order/my-orders">Đơn hàng</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="cs-card">
                <div class="cs-card-header p-4">
                    <div class="cs-badge mb-3">👤 Tài khoản cá nhân</div>
                    <h2 class="cs-page-title mb-1">Quản lý profile</h2>
                    <div class="cs-muted">Cập nhật thông tin cá nhân của bạn.</div>
                </div>

                <div class="p-4">
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <form th:action="@{/profile/update}" method="post" class="vstack gap-3">
                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div>
                            <label class="form-label cs-muted">Tên đăng nhập</label>
                            <input class="form-control" type="text" th:value="${account.username}" readonly>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Họ và tên</label>
                            <input class="form-control" type="text" name="fullname" th:value="${account.fullname}" required>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Email</label>
                            <input class="form-control" type="email" name="email" th:value="${account.email}" required>
                        </div>
                        <div>
                            <label class="form-label cs-muted">Mật khẩu mới (để trống nếu không đổi)</label>
                            <input class="form-control" type="password" name="password" placeholder="Nhập mật khẩu mới">
                        </div>

                        <button class="btn cs-btn cs-btn-primary w-100" type="submit">Cập nhật</button>
                        <a class="btn cs-btn cs-btn-ghost w-100" href="/">Về trang chủ</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
