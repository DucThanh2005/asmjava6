<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>
<body>

<header class="ford-header">
    <div class="ford-header-inner">
        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="#">Dịch vụ & Hỗ trợ</a>
        </nav>
        <a class="ford-logo" href="/">CarStore</a>
        <div class="ford-nav-right">
            <a href="/car/list" class="ford-icon-btn" title="Đại lý" aria-label="Đại lý">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </a>
            <a href="/logout" class="ford-icon-btn" title="Đăng xuất" aria-label="Đăng xuất">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>
</header>

<div class="container cs-container py-4">
    <div class="cs-hero mb-4">
        <div class="cs-badge mb-3">🛒 Shopping</div>
        <h1 class="cs-page-title mb-0">Giỏ hàng</h1>
    </div>

    <div class="cs-card p-3 p-md-4">
        <div class="table-responsive">
            <table class="table cs-table align-middle mb-0">
                <thead>
                <tr>
                    <th>Name</th>
                    <th class="text-end">Price</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end">Total</th>
                    <th class="text-end"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cart}">
                    <td class="fw-semibold" th:text="${c.name}"></td>
                    <td class="text-end" th:text="${c.price}"></td>
                    <td class="text-center" th:text="${c.quantity}"></td>
                    <td class="text-end" th:text="${c.price * c.quantity}"></td>
                    <td class="text-end">
                        <a class="btn cs-btn cs-btn-danger btn-sm" th:href="@{'/cart/remove/' + ${c.id}}">Remove</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="cs-muted">Tổng tiền</div>
            <div class="h4 mb-0 fw-bold" th:text="${total}">0</div>
        </div>
    </div>
</div>

</body>
</html>
